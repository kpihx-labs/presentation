<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KpihX Labs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="KpihX Labs - Sovereign Cloud Journey">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Thème Vue pour un rendu clair et moderne -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">Chargement de KpihX Labs...</div>
  <script>
    window.$docsify = {
      name: 'KpihX Labs',
      repo: 'https://github.com/kpihx-labs/presentation',
      loadSidebar: true,      // Active la barre de navigation gauche
      subMaxLevel: 2,         // Niveau de profondeur des titres dans la barre
      auto2top: true,         // Remonte en haut à chaque changement de page
      themeColor: '#3F51B5',  // Couleur d'accentuation (Indigo)
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md' // Force la sidebar racine partout
      }
    }
  </script>
  <!-- Moteur Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins de coloration syntaxique pour tes scripts et templates -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-ini.min.js"></script>
</body>
</html>
