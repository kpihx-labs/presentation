# GitLab to GitHub Mirroring (Sync Only)
# File: gitlab-sync.yaml
# Description: Synchronizes your private GitLab repository to a public GitHub organization repo.

stages:
  - sync

sync_github:
  stage: sync
  variables:
    GITHUB_ORG: "KpihX-Lab"
    REPO_NAME: "sentinel"
  only:
    - main
  script:
    - echo "🔄 Syncing to GitHub..."
    # Attempt to create the repo via GitHub API (requires GITHUB_TOKEN with repo scopes)
    - |
      curl -H "Authorization: token ${GITHUB_TOKEN}" \
           -X POST \
           -d "{\"name\":\"${REPO_NAME}\", \"private\":false}" \
           https://api.github.com/orgs/${GITHUB_ORG}/repos || true
    # Add remote and force push
    - git remote add github https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_ORG}/${REPO_NAME}.git || git remote set-url github https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_ORG}/${REPO_NAME}.git
    - git push github $CI_COMMIT_SHA:refs/heads/main --force
    - echo "✅ Sync complete."
