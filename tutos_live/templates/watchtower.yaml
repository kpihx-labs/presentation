# Watchtower Automated Updates
# File: watchtower.yaml
# Description: Automated container image updates with cleanup and scheduling.

services:
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    environment:
      # Use DOCKER_API_VERSION=1.44 for compatibility with Docker 27+
      - DOCKER_API_VERSION=1.44
      # Clean up old images after updating to save disk space
      - WATCHTOWER_CLEANUP=true
      # Schedule: Every day at 05:00 AM (Seconds Minutes Hours Day Month Weekday)
      - WATCHTOWER_SCHEDULE=0 0 5 * * *
