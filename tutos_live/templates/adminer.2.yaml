# Adminer Database Manager (Version 2 - Dual Access Local/Trusted)
# File: adminer.2.yaml
# Description: Web interface for PostgreSQL with production SSL certification.

services:
  adminer:
    image: adminer:4-standalone
    container_name: adminer
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"

      # --- Router 1: Local (.homelab) ---
      - "traefik.http.routers.adminer.rule=Host(`db.homelab`)"
      - "traefik.http.routers.adminer.entrypoints=web,websecure"
      - "traefik.http.routers.adminer.tls=true"
      - "traefik.http.routers.adminer.middlewares=auth"

      # --- Router 2: Souverain & Certifié (.kpihx-labs.com) ---
      - "traefik.http.routers.adminer-trusted.rule=Host(`db.kpihx-labs.com`)"
      - "traefik.http.routers.adminer-trusted.entrypoints=websecure"
      - "traefik.http.routers.adminer-trusted.tls=true"
      - "traefik.http.routers.adminer-trusted.tls.certresolver=myresolver"
      - "traefik.http.routers.adminer-trusted.middlewares=auth"

networks:
  proxy:
    external: true
