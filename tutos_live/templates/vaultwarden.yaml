# Vaultwarden Password Manager
# File: vaultwarden.yaml
# Description: Self-hosted Bitwarden-compatible server for secret management.

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      # Block new registrations after your account is created
      - SIGNUPS_ALLOWED=${SIGNUPS_ALLOWED:-false}
      # Required for proper link generation and HTTPS functioning
      - DOMAIN=https://${DOMAIN}
    volumes:
      - vaultwarden_data:/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vault.rule=Host(`vault.homelab`)"
      - "traefik.http.routers.vault.entrypoints=websecure"
      - "traefik.http.routers.vault.tls=true"
      - "traefik.http.services.vault.loadbalancer.server.port=80"
      # Recommended to disable automatic updates for critical vault data
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  vaultwarden_data:

networks:
  proxy:
    external: true
