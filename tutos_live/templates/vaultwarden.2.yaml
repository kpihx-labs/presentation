# Vaultwarden (Bitwarden Server) Stack (Version 2 - Certified with Wildcard)
# File: vaultwarden.2.yaml
# Description: Self-hosted password manager with production SSL certification.

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - SIGNUPS_ALLOWED=${SIGNUPS_ALLOWED}
      - DOMAIN=${DOMAIN}
    volumes:
      - vaultwarden_data:/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      
      # --- ACCÈS LOCAL (Non certifié par autorité publique) ---
      # - "traefik.http.routers.vault-local.rule=Host(`vault.homelab`)"
      # - "traefik.http.routers.vault-local.entrypoints=web,websecure"
      # - "traefik.http.routers.vault-local.tls=true" 
      # - "traefik.http.services.vault-local.loadbalancer.server.port=80"
      
      # --- ACCÈS PUBLIC/PRIVÉ CERTIFIÉ (Via DNS-01 Challenge) ---
      - "traefik.http.routers.vault.rule=Host(`vault.kpihx-labs.com`)"
      - "traefik.http.routers.vault.entrypoints=websecure"
      - "traefik.http.routers.vault.tls=true"
      
      # Port interne de Vaultwarden
      - "traefik.http.services.vault.loadbalancer.server.port=80"
      
      # UTILISATION DU RÉSOLVEUR WILDCARD
      # Traefik piochera le certificat *.kpihx-labs.com déjà généré
      - "traefik.http.routers.vault.tls.certresolver=myresolver"

      # Protection contre les mises à jour intempestives
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  vaultwarden_data:

networks:
  proxy:
    external: true
