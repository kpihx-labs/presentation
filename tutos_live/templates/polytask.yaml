# PolyTask Pro (Streamlit/Django hybrid)
# File: polytask.yaml
# Description: Task management app with Streamlit UI and Postgres backend.

services:
  polytask:
    build: .
    container_name: polytask
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - TZ=Europe/Paris
    
    networks:
      - proxy

    # Optimized Streamlit command for Traefik proxy compatibility
    command: >
      streamlit run app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.enableCORS=false
      --server.enableXsrfProtection=false
      --server.enableWebsocketCompression=false
      --browser.gatherUsageStats=false
    
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.polytask.rule=Host(`task.homelab`)"
      - "traefik.http.routers.polytask.entrypoints=websecure"
      - "traefik.http.routers.polytask.tls=true"
      - "traefik.http.routers.polytask.middlewares=auth"

networks:
  proxy:
    external: true
