# GitLab CI Full Pipeline (Deploy + GitHub Sync)
# File: gitlab-ci-deploy-sync.yaml
# Description: Automated deployment to the homelab Runner, followed by synchronization to a public GitHub mirror.

stages:
  - deploy
  - sync

deploy_homelab:
  stage: deploy
  tags:
    - homelab # Targets your specific homelab Runner
  only:
    - main
  script:
    - echo "🚀 Starting deployment to Homelab..."
    
    # 1. Dynamically recreate the .env file from GitLab CI/CD Secrets
    - echo "TELEGRAM_TOKEN=$TELEGRAM_TOKEN" >> .env
    - echo "CHAT_ID=$CHAT_ID" >> .env
    
    # Optional: Inject proxy variables for restricted networks (like X)
    # - echo "http_proxy=http://129.104.201.11:8080" >> .env
    
    # 2. Deploy the stack
    - docker compose up -d --build --remove-orphans
    
    # 3. System hygiene: Remove dangling images to prevent disk saturation
    - docker image prune -f
    
    - echo "✅ Deployment successful!"

sync_github:
  stage: sync
  variables:
    GITHUB_ORG: "kpihx-labs"
    REPO_NAME: "your-project-name"
  only:
    - main
  script:
    - echo "🔍 Verifying/Creating repository on GitHub..."
    # Attempt to create the public repo via GitHub API (fails gracefully if it exists)
    - |
      curl -H "Authorization: token ${GITHUB_TOKEN}" \
           -X POST \
           -d "{\"name\":\"${REPO_NAME}\", \"private\":false}" \
           https://api.github.com/orgs/${GITHUB_ORG}/repos || true
    
    - echo "🔄 Syncing code..."
    # Configure the remote with the access token
    - git remote add github https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_ORG}/${REPO_NAME}.git || git remote set-url github https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_ORG}/${REPO_NAME}.git
    
    # Force push the current commit to the remote main branch
    - git push github $CI_COMMIT_SHA:refs/heads/main --force
    - echo "✅ Sync complete."
