# KpihX Labs - Presentation Documentation CI/CD
# File: .gitlab-ci.yml

stages:
  - deploy_pages

github_pages:
  stage: deploy_pages
  tags:
    - homelab
  variables:
    GITHUB_ORG: "kpihx-labs"
    REPO_NAME: "presentation"
  only:
    - main
  script:
    - "echo '🚀 Preparing GitHub Pages deployment...'"
    
    # Configure Git
    - "git config --global user.email 'ci@kpihx-labs.com'"
    - "git config --global user.name 'GitLab CI'"
    
    # 1. Prepare branches
    - "CURRENT_SHA=$CI_COMMIT_SHA"
    - "git branch -D gh-pages || true"
    - "git checkout -b gh-pages"
    
    # 2. Sync to GitHub
    - "echo '🔄 Pushing to GitHub...'"
    - "git remote remove github || true"
    - "git remote add github https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_ORG}/${REPO_NAME}.git"
    
    # Push main source and gh-pages site
    - "git push github $CURRENT_SHA:refs/heads/main --force"
    - "git push github gh-pages:refs/heads/gh-pages --force"
    
    - "echo '✅ Sync complete.'"
